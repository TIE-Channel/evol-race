name: Generate signing keystore

on:
  workflow_dispatch:

jobs:
  generate-keystore:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate keystore and prepare secrets file
        shell: bash
        run: |
          set -e
          KEYSTORE_PASSWORD=$(openssl rand -base64 24 | tr -d '/+=' | head -c 24)
          KEY_PASSWORD="$KEYSTORE_PASSWORD"
          KEY_ALIAS="evolrace"

          echo "Generating new release keystore..."
          keytool -genkeypair \
            -dname "CN=Evolrace, OU=TIE-Games, O=TIE-Games, L=Dresden, S=Saxony, C=DE" \
            -alias "$KEY_ALIAS" \
            -keypass "$KEY_PASSWORD" \
            -keystore evolrace-release.keystore \
            -storepass "$KEYSTORE_PASSWORD" \
            -validity 25000 \
            -keyalg RSA \
            -keysize 2048

          KEYSTORE_BASE64=$(base64 -w 0 evolrace-release.keystore)
          SHA1=$(keytool -list -v -keystore evolrace-release.keystore -alias "$KEY_ALIAS" -storepass "$KEYSTORE_PASSWORD" 2>/dev/null | grep "SHA1:" | head -1 | awk '{print $2}' || echo "unknown")

          mkdir -p output
          # Создаём файл инструкций через echo (без heredoc чтобы не ломать YAML парсер)
          {
            echo "================================================================="
            echo "EVOLRACE ANDROID SIGNING KEYSTORE - GITHUB SECRETS SETUP"
            echo "================================================================="
            echo ""
            echo "Add these 4 secrets to GitHub:"
            echo "Settings -> Secrets and variables -> Actions -> New repository secret"
            echo ""
            echo "IMPORTANT: Save evolrace-release.keystore in a SAFE place!"
            echo "Without it you can never update your app in Play Store."
            echo ""
            echo "Keystore SHA1 fingerprint: $SHA1"
            echo ""
            echo "================================================================="
            echo "SECRET 1 of 4"
            echo "Name: ANDROID_KEYSTORE_BASE64"
            echo "Value (paste full string below into the secret value field):"
            echo ""
            echo "$KEYSTORE_BASE64"
            echo ""
            echo "================================================================="
            echo "SECRET 2 of 4"
            echo "Name: ANDROID_KEYSTORE_PASSWORD"
            echo "Value: $KEYSTORE_PASSWORD"
            echo ""
            echo "================================================================="
            echo "SECRET 3 of 4"
            echo "Name: ANDROID_KEY_ALIAS"
            echo "Value: $KEY_ALIAS"
            echo ""
            echo "================================================================="
            echo "SECRET 4 of 4"
            echo "Name: ANDROID_KEY_PASSWORD"
            echo "Value: $KEY_PASSWORD"
            echo ""
            echo "================================================================="
            echo "AFTER ADDING ALL 4 SECRETS:"
            echo "1. Delete this workflow run (and its artifact) for security"
            echo "2. Push to main branch - new AAB will be signed with permanent keystore"
            echo "3. SHA1 will always be the same -> Play Store will accept it"
            echo ""
            echo "If you already uploaded an AAB to Play Console with a different key:"
            echo "Delete that release in Internal Testing or recreate the app entirely."
            echo "================================================================="
          } > output/SECRETS.txt

          # Backup keystore тоже сохраняем
          cp evolrace-release.keystore output/

          echo "::add-mask::$KEYSTORE_BASE64"
          echo "::add-mask::$KEYSTORE_PASSWORD"
          echo ""
          echo "Keystore generated. SHA1: $SHA1"
          echo "Download artifact 'keystore-secrets' to get values for GitHub Secrets."

      - name: Upload secrets file
        uses: actions/upload-artifact@v4
        with:
          name: keystore-secrets
          path: output/
          retention-days: 1
